<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>react-sketch-ruler v3 (local)</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="../../../sketch-ruler/lib/index.iife.js"></script>
    <link rel="stylesheet" href="../../../sketch-ruler/lib/style.css" />
    <style>
      .demo {
        width: 100%;
        padding-top: 10px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .demo .whitewrapper {
        background-color: #fafafc;
        background-image:
          linear-gradient(#fafafc 20px, transparent 0),
          linear-gradient(90deg, transparent 20px, #373739 0);
      }

      .demo .blackwrapper {
        background-color: #18181c;
        background-image:
          linear-gradient(#18181c 20px, transparent 0),
          linear-gradient(90deg, transparent 20px, #86909c 0);
      }

      .demo .target {
        position: absolute;
        text-align: center;
        color: #333;
        font-size: 30px;
        font-weight: bold;
        border: 1px solid #333;
        box-sizing: border-box;
      }

      .top {
        display: flex;
        margin-bottom: 10px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
        font-size: 14px;
      }

      .button {
        font-size: 14px;
        padding: 4px 10px;
        cursor: pointer;
      }

      .wrapper {
        margin: 0 auto;
        background-size:
          21px 21px,
          21px 21px;
        border: 1px solid #dadadc;
      }

      .imgStyle {
        width: 100%;
        height: 100%;
      }

      .btns {
        position: absolute;
        display: flex;
        bottom: 20px;
        right: 40px;
        z-index: 999;
      }

      .switch {
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        position: relative;
        width: 40px;
        height: 20px;
        background: #ccc;
        border-radius: 10px;
        transition:
          border-color 0.3s,
          background-color 0.3s;
      }

      .switch::after {
        content: '';
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border-radius: 50%;
        background: #fff;
        box-shadow: 0, 0, 2px, #999;
        transition: 0.4s;
        top: 2px;
        position: absolute;
        left: 2px;
      }

      .switch:checked {
        background: #13ce66;
      }

      .switch:checked::after {
        content: '';
        position: absolute;
        left: 55%;
        top: 2px;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useRef } = React
      const { SketchRule } = window.SketchRuler
      const bgImg = '../assets/bg.png'

      function MyApp() {
        const [rectWidth] = useState(1470)
        const [rectHeight] = useState(800)
        const [canvasWidth] = useState(1920)
        const [canvasHeight] = useState(1080)
        const sketchruleRef = useRef(null)

        const [showRuler, setShowRuler] = useState(true)
        const [lockLine, setLockLine] = useState(false)

        const [state, setState] = useState({
          scale: 1,
          isBlack: false,
          lines: {
            h: [0, 250],
            v: [0, 500]
          },
          thick: 20,
          shadow: {
            x: 0,
            y: 0,
            width: 300,
            height: 300
          },
          isShowReferLine: true,
          enableAnimation: true,
          animationMode: 'ease-out',
          snapThreshold: 5,
          zoomMode: 'pointer'
        })

        const resetMethod = () => {
          sketchruleRef.current?.reset()
        }

        const zoomToPresetMethod = () => {
          sketchruleRef.current?.zoomToPreset(1)
        }

        const changeTheme = () => {
          setState((prevState) => ({ ...prevState, isBlack: !prevState.isBlack }))
        }

        const handleLine = (lines) => {
          setState((prevState) => ({ ...prevState, lines }))
        }

        const zoomOutMethod = () => {
          sketchruleRef.current?.zoomOut()
        }

        const zoomInMethod = () => {
          sketchruleRef.current?.zoomIn()
        }

        const handleShowReferLine = () => {
          setState((prevState) => ({ ...prevState, isShowReferLine: !prevState.isShowReferLine }))
        }

        const scaleChange = (event) => {
          const { value } = event.target
          if (value) {
            sketchruleRef.current?.zoomToPreset(Number(value))
          }
        }

        const changeShadow = () => {
          setState((prevState) => ({
            ...prevState,
            shadow: {
              ...prevState.shadow,
              x: Math.random() * canvasWidth,
              y: Math.random() * canvasHeight
            }
          }))
        }

        const handleCornerClick = (e) => {
          console.log('handleCornerClick', e)
        }

        const updateScale = (scale) => {
          setState((prevState) => ({ ...prevState, scale }))
        }

        const cpuScale = state.scale.toFixed(2)
        const rectStyle = {
          width: `${rectWidth}px`,
          height: `${rectHeight}px`
        }
        const cpuPalette = state.isBlack
          ? {
              bgColor: 'transparent',
              hoverBg: '#fff',
              hoverColor: '#000',
              tickColor: '#BABBBC',
              labelColor: '#DEDEDE',
              shadowColor: '#525252',
              guideLineColor: '#51d6a9',
              borderColor: '#B5B5B5'
            }
          : {
              bgColor: 'transparent',
              guideLineColor: '#51d6a9',
              guideLineStyle: 'dashed'
            }
        const canvasStyle = {
          width: `${canvasWidth}px`,
          height: `${canvasHeight}px`
        }

        return (
          <div className="demo">
            <div className="top">
              <div style={{ marginRight: '10px' }}> 缩放比例:{cpuScale} </div>
              <button className="button" onClick={() => setShowRuler(!showRuler)}>
                {showRuler ? '隐藏标尺' : '显示标尺'}
              </button>
              <button className="button" onClick={handleShowReferLine}>辅助线开关</button>
              <button className="button" onClick={() => setLockLine(!lockLine)}>
                {lockLine ? '解锁参考线' : '锁定参考线'}
              </button>
              <button className="button" onClick={changeShadow}>模拟阴影切换</button>
              <button className="button" onClick={changeTheme}>主题切换</button>
              <button className="button" onClick={resetMethod}>还原</button>
              <button className="button" onClick={zoomOutMethod}>缩小</button>
              <button className="button" onClick={zoomInMethod}>放大</button>
              <button className="button" onClick={zoomToPresetMethod}>100%</button>

              <span>动画:</span>
              <input
                type="checkbox"
                className="switch"
                checked={state.enableAnimation}
                onChange={(e) =>
                  setState((prev) => ({ ...prev, enableAnimation: e.target.checked }))
                }
              />

              <select
                className="button"
                value={state.animationMode}
                onChange={(e) =>
                  setState((prev) => ({ ...prev, animationMode: e.target.value }))
                }
              >
                <option value="direct">direct</option>
                <option value="ease-out">ease-out</option>
                <option value="damped">damped</option>
                <option value="exponential">exponential</option>
              </select>

              <select
                className="button"
                value={state.zoomMode}
                onChange={(e) => {
                  const mode = e.target.value
                  setState((prev) => ({ ...prev, zoomMode: mode }))
                  sketchruleRef.current?.setZoomMode(mode)
                }}
              >
                <option value="pointer">pointer</option>
                <option value="viewport-center">viewport-center</option>
                <option value="content-center">content-center</option>
              </select>

              <input
                style={{ marginRight: '10px' }}
                type="range"
                value={state.scale}
                onChange={scaleChange}
                min="0.1"
                max="3"
                step="0.1"
              />

              <div style={{ marginRight: '4px' }}>吸附阈值:</div>
              <input
                style={{ marginRight: '10px', width: '50px' }}
                type="number"
                value={state.snapThreshold}
                min="0"
                max="50"
                onChange={(e) =>
                  setState((prev) => ({ ...prev, snapThreshold: Number(e.target.value) }))
                }
              />

              <a
                href="https://github.com/kakajun/react-sketch-ruler"
                target="_blank"
                rel="noopener noreferrer"
              >
                <i className="fas fa-external-link-alt"></i> git源码
              </a>
            </div>

            <div
              style={rectStyle}
              className={`wrapper ${state.isBlack ? 'blackwrapper' : 'whitewrapper'}`}
            >
              <SketchRule
                scale={state.scale}
                lockLine={lockLine}
                thick={state.thick}
                width={rectWidth}
                showRuler={showRuler}
                height={rectHeight}
                palette={cpuPalette}
                shadow={state.shadow}
                canvasWidth={canvasWidth}
                canvasHeight={canvasHeight}
                zoomMode={state.zoomMode}
                zoomStep={0.25}
                minZoom={0.1}
                maxZoom={3}
                enableAnimation={state.enableAnimation}
                animationMode={state.animationMode}
                autoCenter={true}
                snapThreshold={state.snapThreshold}
                ref={sketchruleRef}
                isShowReferLine={state.isShowReferLine}
                onHandleCornerClick={handleCornerClick}
                onUpdateScale={updateScale}
                onUpdateLines={handleLine}
                onUpdateLockLine={setLockLine}
                lines={state.lines}
              >
                <div data-type="page" style={canvasStyle}>
                  <img className="imgStyle" src={bgImg} alt="" />
                </div>

                <div slot="toolbar" className="btns">
                  <button onClick={resetMethod}>还原</button>
                  <button onClick={zoomInMethod}>放大</button>
                  <button onClick={zoomOutMethod}>缩小</button>
                </div>
              </SketchRule>
            </div>
          </div>
        )
      }

      const container = document.getElementById('root')
      const root = ReactDOM.createRoot(container)
      root.render(<MyApp />)
    </script>
  </body>
</html>
